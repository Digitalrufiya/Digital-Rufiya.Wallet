<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRF Chain Admin + Blockchain System</title>

<style>
body {
  font-family: Georgia, serif;
  background: #f4f1ea;
  margin: 0;
}

.container {
  display: flex;
  justify-content: center;
  padding: 30px;
}

.panel {
  width: 900px;
  background: white;
  padding: 40px;
  border: 3px solid #b08d57;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

h1, h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  background: #b08d57;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #8c6d3d;
}

/* SECTIONS */
.section {
  margin-top: 30px;
  padding: 20px;
  border: 1px solid #d6c6a5;
  background: #faf8f3;
}

/* BLOCKS */
.block {
  border-left: 4px solid #b08d57;
  padding: 10px;
  margin-top: 10px;
  background: #fff;
  font-size: 14px;
}

.verified { color: green; font-weight: bold; }
.error { color: red; font-weight: bold; }
</style>
</head>

<body>

<div class="container">
<div class="panel">

<h1>DRF Chain Blockchain System</h1>

<!-- ================= ADMIN PANEL ================= -->
<div class="section">
<h2>👨‍💼 Admin Panel (Issue Certificate)</h2>

<input id="name" placeholder="Student Name">
<input id="govid" placeholder="Government ID (A-XXX**)">
<input id="course" placeholder="Course Name">
<button onclick="addCertificate()">Generate Certificate</button>
</div>

<!-- ================= VERIFY PANEL ================= -->
<div class="section">
<h2>🔐 Verification Portal</h2>

<input id="verifyId" placeholder="Enter Certificate ID">
<button onclick="verifyCertificate()">Verify</button>

<div id="verifyResult"></div>
</div>

<!-- ================= BLOCKCHAIN VIEW ================= -->
<div class="section">
<h2>⛓️ Blockchain Ledger</h2>
<div id="chainView"></div>
</div>

</div>
</div>

<script>

///////////////////////////////
// LOAD OR INIT CHAIN
///////////////////////////////
let chain = JSON.parse(localStorage.getItem("drf_chain")) || [];

///////////////////////////////
// SHA-256 HASH FUNCTION
///////////////////////////////
async function hash(data) {
  const enc = new TextEncoder().encode(data);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

///////////////////////////////
// ADD CERTIFICATE (ADMIN)
///////////////////////////////
async function addCertificate() {

  const name = document.getElementById("name").value;
  const govid = document.getElementById("govid").value;
  const course = document.getElementById("course").value;

  const certId = "DRF-" + (2026 + chain.length) + "-" + (1000 + chain.length);

  const prevHash = chain.length ? chain[chain.length - 1].hash : "0";

  const dataString = certId + name + govid + course + prevHash;

  const newHash = await hash(dataString);

  const block = {
    index: chain.length + 1,
    certId,
    name,
    govid,
    course,
    prevHash,
    hash: newHash
  };

  chain.push(block);
  localStorage.setItem("drf_chain", JSON.stringify(chain));

  renderChain();

  alert("Certificate Issued: " + certId);
}

///////////////////////////////
// VERIFY CERTIFICATE
///////////////////////////////
async function verifyCertificate() {

  const id = document.getElementById("verifyId").value;
  const box = document.getElementById("verifyResult");

  const block = chain.find(b => b.certId === id);

  if (!block) {
    box.innerHTML = "<p class='error'>❌ NOT FOUND IN BLOCKCHAIN</p>";
    return;
  }

  const dataString = block.certId + block.name + block.govid + block.course + block.prevHash;
  const checkHash = await hash(dataString);

  if (checkHash === block.hash) {
    box.innerHTML = `
      <p class='verified'>✔ CERTIFICATE VERIFIED</p>
      <p><b>Name:</b> ${block.name}</p>
      <p><b>Gov ID:</b> ${block.govid}</p>
      <p><b>Course:</b> ${block.course}</p>
      <p><b>Certificate ID:</b> ${block.certId}</p>
    `;
  } else {
    box.innerHTML = "<p class='error'>⚠ TAMPER DETECTED</p>";
  }
}

///////////////////////////////
// RENDER BLOCKCHAIN
///////////////////////////////
function renderChain() {

  const view = document.getElementById("chainView");
  view.innerHTML = "";

  chain.forEach(b => {
    view.innerHTML += `
      <div class="block">
        <b>${b.certId}</b><br>
        Name: ${b.name}<br>
        Course: ${b.course}<br>
        Hash: ${b.hash}
      </div>
    `;
  });
}

renderChain();

</script>

</body>
</html>
