<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRF Chain Full Certificate System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: Georgia, serif;
  background: #f4f1ea;
  margin: 0;
}

.container {
  display: flex;
  justify-content: center;
  padding: 30px;
}

.panel {
  width: 950px;
  background: white;
  padding: 40px;
  border: 3px solid #b08d57;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

h1, h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}

button {
  padding: 10px 15px;
  background: #b08d57;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #8c6d3d;
}

.section {
  margin-top: 25px;
  padding: 20px;
  border: 1px solid #d6c6a5;
  background: #faf8f3;
}

.block {
  border-left: 4px solid #b08d57;
  padding: 10px;
  margin-top: 10px;
  background: white;
}

.verified { color: green; font-weight: bold; }
.error { color: red; font-weight: bold; }

/* CERTIFICATE */
.certificate {
  display: none;
  background: white;
  padding: 40px;
  border: 2px solid #b08d57;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
<div class="panel">

<h1>DRF Chain Certificate System</h1>

<!-- ================= LOGIN ================= -->
<div class="section">
<h2>🔐 Admin Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- ================= ADMIN ================= -->
<div class="section" id="admin" style="display:none;">
<h2>👨‍💼 Issue Certificate</h2>

<input id="name" placeholder="Student Name">
<input id="govid" placeholder="Government ID">
<input id="course" placeholder="Course Name">

<button onclick="addCert()">Generate Certificate</button>
</div>

<!-- ================= VERIFY ================= -->
<div class="section">
<h2>🔐 Verification Portal</h2>

<input id="verifyId" placeholder="Enter Certificate ID">
<button onclick="verify()">Verify</button>

<div id="result"></div>
</div>

<!-- ================= BLOCKCHAIN ================= -->
<div class="section">
<h2>⛓️ Blockchain Ledger</h2>
<div id="chain"></div>
</div>

<!-- ================= CERTIFICATE OUTPUT ================= -->
<div class="certificate" id="certificate">
<h2>DRF CHAIN CERTIFICATE</h2>
<div id="certData"></div>
<div id="qr"></div>
<button onclick="downloadPDF()">Download PDF</button>
</div>

</div>
</div>

<script>

//////////////////////////
// STORAGE
//////////////////////////
let chain = JSON.parse(localStorage.getItem("drf")) || [];

//////////////////////////
// LOGIN
//////////////////////////
function login() {
  if (
    document.getElementById("user").value === "Fayaz91000" &&
    document.getElementById("pass").value === "91000"
  ) {
    document.getElementById("admin").style.display = "block";
    document.getElementById("msg").innerHTML = "✔ Access Granted";
  } else {
    document.getElementById("msg").innerHTML = "❌ Invalid Login";
  }
}

//////////////////////////
// HASH
//////////////////////////
async function hash(data) {
  const enc = new TextEncoder().encode(data);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

//////////////////////////
// ADD CERTIFICATE
//////////////////////////
async function addCert() {

  const name = document.getElementById("name").value;
  const govid = document.getElementById("govid").value;
  const course = document.getElementById("course").value;

  const certId = "DRF-2026-" + (1000 + chain.length);
  const prev = chain.length ? chain[chain.length-1].hash : "0";

  const data = certId + name + govid + course + prev;
  const h = await hash(data);

  const block = { certId, name, govid, course, prev, hash: h };

  chain.push(block);
  localStorage.setItem("drf", JSON.stringify(chain));

  render();
}

//////////////////////////
// VERIFY (AUTO QR SUPPORT)
//////////////////////////
window.onload = function () {
  const url = new URLSearchParams(window.location.search);
  const id = url.get("id");
  if (id) {
    document.getElementById("verifyId").value = id;
    verify();
  }
};

async function verify() {
  const id = document.getElementById("verifyId").value;
  const r = document.getElementById("result");

  const b = chain.find(x => x.certId === id);

  if (!b) {
    r.innerHTML = "<p class='error'>❌ NOT FOUND</p>";
    return;
  }

  r.innerHTML = `
    <p class='verified'>✔ VERIFIED</p>
    <p>Name: ${b.name}</p>
    <p>Gov ID: ${b.govid}</p>
    <p>Course: ${b.course}</p>
  `;

  showCertificate(b);
}

//////////////////////////
// CERTIFICATE + QR
//////////////////////////
function showCertificate(b) {

  document.getElementById("certificate").style.display = "block";

  document.getElementById("certData").innerHTML = `
    <h3>${b.name}</h3>
    <p>${b.course}</p>
    <p>ID: ${b.certId}</p>
  `;

  document.getElementById("qr").innerHTML = "";

  new QRCode(document.getElementById("qr"), {
    text: window.location.href.split('?')[0] + "?id=" + b.certId,
    width: 120,
    height: 120
  });
}

//////////////////////////
// PDF DOWNLOAD
//////////////////////////
function downloadPDF() {
  html2pdf().from(document.getElementById("certificate")).save();
}

//////////////////////////
// RENDER CHAIN
//////////////////////////
function render() {
  const c = document.getElementById("chain");
  c.innerHTML = "";

  chain.forEach(b => {
    c.innerHTML += `
      <div class="block">
        <b>${b.certId}</b><br>
        ${b.name} | ${b.course}
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
