<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRF Chain Minting System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
}

/* PANEL */
.container {
  display: flex;
  justify-content: center;
  padding: 30px;
}

.panel {
  width: 950px;
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}

/* BUTTON */
button {
  padding: 12px 18px;
  background: linear-gradient(90deg,#b08d57,#f5d07a);
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* ================= MINT LOADER ================= */
#loader {
  display: none;
  text-align: center;
  margin: 20px 0;
}

.spinner {
  width: 60px;
  height: 60px;
  border: 6px solid rgba(255,255,255,0.2);
  border-top: 6px solid #f5d07a;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* ================= CERTIFICATE ================= */
.certificate {
  display: none;
  margin-top: 20px;
  padding: 50px;
  border-radius: 20px;
  background: linear-gradient(145deg,#fff,#f6ecd6);
  color: black;
  transform-style: preserve-3d;
  animation: pop 1s ease-out;
  box-shadow: 0 40px 120px rgba(0,0,0,0.7);
}

@keyframes pop {
  0% { transform: scale(0.6) rotateX(-30deg); opacity: 0; }
  100% { transform: scale(1) rotateX(0); opacity: 1; }
}

/* MINT SUCCESS TEXT */
.success {
  color: #00ff88;
  font-weight: bold;
  text-align: center;
  margin: 10px 0;
}

/* BLOCK */
.block {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  margin-top: 10px;
  border-left: 3px solid #f5d07a;
}
</style>
</head>

<body>

<div class="container">
<div class="panel">

<h1>🏛️ DRF Chain Minting System</h1>

<!-- ADMIN -->
<h3>Admin Panel</h3>
<input id="name" placeholder="Name">
<input id="gov" placeholder="Gov ID">
<input id="course" placeholder="Course">
<button onclick="mint()">Mint Certificate</button>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p>Minting on DRF Blockchain...</p>
</div>

<p id="status"></p>

<!-- CERTIFICATE -->
<div class="certificate" id="cert">
  <h2>DRF CHAIN CERTIFICATE</h2>
  <div id="certData"></div>
  <div id="qr"></div>
</div>

<!-- BLOCKCHAIN -->
<h3>Chain</h3>
<div id="chain"></div>

</div>
</div>

<script>

let chain = JSON.parse(localStorage.getItem("drf") || "[]");

async function hash(data){
  const e=new TextEncoder().encode(data);
  const b=await crypto.subtle.digest("SHA-256",e);
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ================= MINT ANIMATION ================= */
async function mint(){

document.getElementById("loader").style.display = "block";
document.getElementById("status").innerHTML = "";

await new Promise(r => setTimeout(r, 2000)); // fake blockchain delay

const id = "DRF-" + Date.now();
const prev = chain.length ? chain[chain.length-1].hash : "0";

const data = id + name.value + gov.value + course.value + prev;
const h = await hash(data);

const block = {id,name:name.value,gov:gov.value,course:course.value,prev,hash:h};

chain.push(block);
localStorage.setItem("drf",JSON.stringify(chain));

document.getElementById("loader").style.display = "none";

document.getElementById("status").innerHTML =
"<div class='success'>✔ MINT COMPLETE</div>";

showCert(block);
render();
}

/* ================= CERT SHOW ================= */
function showCert(b){

document.getElementById("cert").style.display = "block";

document.getElementById("certData").innerHTML = `
<h2>${b.name}</h2>
<p>${b.course}</p>
<p>${b.id}</p>
`;

document.getElementById("qr").innerHTML = "";

new QRCode(document.getElementById("qr"), {
  text: location.href + "?id=" + b.id,
  width: 120,
  height: 120
});
}

/* ================= RENDER ================= */
function render(){
let box = document.getElementById("chain");
box.innerHTML = "";

chain.forEach(b=>{
box.innerHTML += `
<div class="block">
<b>${b.id}</b><br>
${b.name} | ${b.course}
</div>
`;
});
}

render();

</script>

</body>
</html>
