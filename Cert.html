<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRF Chain University Credential System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: radial-gradient(circle at top, #0d0d0d, #000);
  color: white;
}

.container {
  display: flex;
  justify-content: center;
  padding: 30px;
}

.panel {
  width: 1000px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 40px;
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.2);
}

/* INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}

/* BUTTON */
button {
  padding: 12px 18px;
  background: linear-gradient(90deg,#b08d57,#f5d07a);
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* ================= DIPLOMA ================= */
.diploma {
  display: none;
  margin-top: 20px;
  padding: 60px;
  background: linear-gradient(145deg,#fff,#f7efd8);
  color: #111;
  border-radius: 20px;
  position: relative;

  animation: reveal 1.2s ease-out;
  box-shadow: 0 50px 150px rgba(0,0,0,0.7);
}

@keyframes reveal {
  0% { transform: scale(0.6) rotateX(-25deg); opacity: 0; }
  100% { transform: scale(1) rotateX(0); opacity: 1; }
}

/* GOLD SEAL */
.seal {
  width: 130px;
  height: 130px;
  margin: 20px auto;
  border-radius: 50%;
  border: 6px double #b08d57;
  background: radial-gradient(circle,#fff,#f5e6c2);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
  animation: sealPop 1s ease-out;
}

@keyframes sealPop {
  0% { transform: scale(3) rotate(180deg); opacity: 0; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

/* BLOCKCHAIN BLOCK */
.block {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  margin-top: 10px;
  border-left: 3px solid #f5d07a;
  color: white;
}

/* STATUS */
.ok { color: #00ff88; font-weight: bold; }
.bad { color: #ff4d4d; font-weight: bold; }
</style>
</head>

<body>

<div class="container">
<div class="panel">

<h1>🏛️ DRF Chain University Credential System</h1>

<!-- ADMIN -->
<h3>👨‍💼 Admin Panel</h3>

<input id="name" placeholder="Full Name">
<input id="gov" placeholder="ID Number (A0193839)">

<select id="course">
  <option>Diploma in Human Resources</option>
  <option>Diploma in Administrative Office</option>
  <option>Bachelor in Business Management</option>
  <option>Master in Information Systems</option>
  <option>Doctorate in Blockchain Systems</option>
</select>

<select id="tier">
  <option>Top Ten Tier</option>
  <option>Distinction</option>
  <option>Merit</option>
  <option>Pass</option>
</select>

<button onclick="mint()">Mint Academic Credential</button>

<!-- LOADER -->
<div id="loader" style="display:none;text-align:center;margin:20px;">
  <div style="width:50px;height:50px;border:5px solid #444;border-top:5px solid #f5d07a;border-radius:50%;animation:spin 1s linear infinite;margin:auto;"></div>
  <p>Minting Academic Credential on DRF Chain...</p>
</div>

<!-- DIPLOMA -->
<div class="diploma" id="diploma">
  <h2>🏛️ DRF CHAIN UNIVERSITY</h2>
  <h3 id="d_name"></h3>
  <p id="d_id"></p>
  <h2 id="d_course"></h2>
  <p id="d_tier"></p>
  <p id="d_chain"></p>

  <div class="seal"></div>
  <div id="qr"></div>

  <button onclick="downloadPDF()">Download Diploma PDF</button>
</div>

<!-- BLOCKCHAIN -->
<h3>⛓️ Ledger</h3>
<div id="chain"></div>

</div>
</div>

<script>

let chain = JSON.parse(localStorage.getItem("drf_uni") || "[]");

function spin(){}

async function hash(data){
  const e=new TextEncoder().encode(data);
  const b=await crypto.subtle.digest("SHA-256",e);
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

//////////////////// MINT ////////////////////
async function mint(){

document.getElementById("loader").style.display="block";

await new Promise(r=>setTimeout(r,2000));

const id="DRF-"+Date.now();
const prev=chain.length?chain[chain.length-1].hash:"0";

const data=id+name.value+gov.value+course.value+tier.value+prev;
const h=await hash(data);

const block={id,name:name.value,gov:gov.value,course:course.value,tier:tier.value,prev,hash:h};

chain.push(block);
localStorage.setItem("drf_uni",JSON.stringify(chain));

document.getElementById("loader").style.display="none";

showDiploma(block);
render();
}

//////////////////// DIPLOMA ////////////////////
function showDiploma(b){

document.getElementById("diploma").style.display="block";

document.getElementById("d_name").innerHTML=b.name;
document.getElementById("d_id").innerHTML="ID: "+b.gov;
document.getElementById("d_course").innerHTML=b.course;
document.getElementById("d_tier").innerHTML="🏆 "+b.tier;
document.getElementById("d_chain").innerHTML="⛓️ "+b.id;

document.getElementById("qr").innerHTML="";

new QRCode(document.getElementById("qr"),{
text:location.href+"?id="+b.id,
width:120,height:120
});
}

//////////////////// PDF ////////////////////
function downloadPDF(){
html2pdf().from(document.getElementById("diploma")).save();
}

//////////////////// RENDER ////////////////////
function render(){
let box=document.getElementById("chain");
box.innerHTML="";
chain.forEach(b=>{
box.innerHTML+=`
<div class="block">
<b>${b.id}</b><br>
${b.name} | ${b.course}
</div>
`;
});
}

render();

</script>

</body>
</html>
