<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRF Chain SaaS PDF System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
  margin:0;
  font-family: Georgia, serif;
  background:#0b0b0b;
  color:white;
}

.container{
  display:flex;
  justify-content:center;
  padding:30px;
}

.panel{
  width:1100px;
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  padding:12px 18px;
  background:linear-gradient(90deg,#b08d57,#f5d07a);
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* SECTIONS */
.section{
  margin-top:20px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.15);
}

/* DIPLOMA */
.diploma{
  display:none;
  margin-top:20px;
  padding:70px;
  background:white;
  color:#111;
  position:relative;
  border:10px solid #b08d57;
  box-shadow:0 40px 120px rgba(0,0,0,0.8);
}

/* TEXT */
.title{text-align:center;font-size:28px;letter-spacing:3px;}
.name{text-align:center;font-size:34px;font-weight:bold;margin-top:10px;}
.course,.meta{text-align:center;margin-top:10px;}

/* QR */
#qr{
  position:absolute;
  bottom:40px;
  left:40px;
}

/* BLOCKCHAIN */
.block{
  background:rgba(255,255,255,0.08);
  padding:10px;
  margin-top:8px;
  border-left:3px solid #f5d07a;
}

.ok{color:#00ff88;}
.bad{color:#ff4d4d;}

</style>
</head>

<body>

<div class="container">
<div class="panel">

<h1>🏛️ DRF CHAIN SAAS (PDF CERTIFICATE SYSTEM)</h1>

---

# 👨‍💼 ADMIN LOGIN

<div class="section">
<h3>🔐 Admin Login</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Unlock Admin</button>
</div>

---

# 👨‍💼 MINT CERTIFICATE (MANUAL COURSE INPUT)

<div class="section" id="adminPanel" style="display:none;">

<h3>🎓 Create Certificate</h3>

<input id="name" placeholder="Full Name">
<input id="gov" placeholder="ID Number">

<!-- MANUAL COURSE INPUT -->
<input id="course" placeholder="Enter Course Name (ANY COURSE YOU WANT)">

<input id="tier" placeholder="Achievement (Top Ten Tier / Distinction)">

<button onclick="mint()">Mint Certificate</button>
</div>

---

# 🌍 VERIFICATION

<div class="section">
<h3>🔐 Verify Certificate</h3>
<input id="vid" placeholder="Enter Certificate ID">
<button onclick="verify()">Verify</button>
<p id="result"></p>
</div>

---

# 🎓 CERTIFICATE

<div class="diploma" id="diploma">

<div class="title">DRF CHAIN UNIVERSITY</div>

<div class="name" id="d_name"></div>
<div class="meta" id="d_id"></div>
<div class="course" id="d_course"></div>
<div class="meta" id="d_tier"></div>
<div class="meta" id="d_chain"></div>

<div id="qr"></div>

<!-- DOWNLOAD BUTTON -->
<div style="text-align:center;margin-top:30px;">
<button onclick="downloadPDF()">📄 Download PDF Certificate</button>
</div>

</div>

---

# ⛓️ LEDGER

<h3>Blockchain Ledger</h3>
<div id="chain"></div>

</div>
</div>

<script>

let chain = JSON.parse(localStorage.getItem("drf_pdf") || "[]");

/* LOGIN */
function login(){
  if(u.value==="Fayaz91000" && p.value==="91000"){
    adminPanel.style.display="block";
  } else {
    alert("Invalid login");
  }
}

/* HASH */
async function hash(data){
  const e=new TextEncoder().encode(data);
  const b=await crypto.subtle.digest("SHA-256",e);
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* CLEAN */
function clean(b){
  return {
    id: b.id || "DRF-UNKNOWN",
    name: b.name || "Genuine DRF Chain User",
    gov: b.gov || "N/A",
    course: b.course || "Not Assigned",
    tier: b.tier || "Standard"
  };
}

/* MINT */
async function mint(){

const id="DRF-"+Date.now();
const prev=chain.length?chain[chain.length-1].hash:"0";

const data=id+name.value+gov.value+course.value+tier.value+prev;
const h=await hash(data);

chain.push({
  id,
  name:name.value,
  gov:gov.value,
  course:course.value,
  tier:tier.value,
  prev,
  hash:h
});

localStorage.setItem("drf_pdf",JSON.stringify(chain));

render();
alert("Certificate Minted ✔");
}

/* VERIFY */
function verify(){

let b=chain.find(x=>x.id===vid.value);

if(!b){
result.innerHTML="<span class='bad'>NOT FOUND</span>";
diploma.style.display="none";
return;
}

b=clean(b);

diploma.style.display="block";

d_name.innerHTML=b.name;
d_id.innerHTML="ID: "+b.gov;
d_course.innerHTML=b.course;
d_tier.innerHTML=b.tier;
d_chain.innerHTML="⛓️ "+b.id;

new QRCode(document.getElementById("qr"),{
text:location.href+"?id="+b.id,
width:110,height:110
});

result.innerHTML="<span class='ok'>VERIFIED ✔</span>";
}

/* PDF DOWNLOAD */
function downloadPDF(){
html2pdf().from(document.getElementById("diploma")).save();
}

/* RENDER */
function render(){
let box=document.getElementById("chain");
box.innerHTML="";
chain.forEach(b=>{
b=clean(b);
box.innerHTML+=`
<div class="block">
<b>${b.id}</b> | ${b.name} | ${b.course}
</div>`;
});
}

render();

</script>

</body>
</html>
