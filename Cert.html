<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRF Chain University SaaS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
  margin:0;
  font-family: Georgia, serif;
  background:#0b0b0b;
  color:white;
}

.container{
  display:flex;
  justify-content:center;
  padding:30px;
}

.panel{
  width:1100px;
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
}

/* INPUT */
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:12px 18px;
  background:linear-gradient(90deg,#b08d57,#f5d07a);
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* ================= DIPLOMA ================= */
.diploma{
  display:none;
  margin-top:20px;
  padding:70px;
  background:white;
  color:#111;
  position:relative;
  border:10px solid #b08d57;
  box-shadow:0 40px 120px rgba(0,0,0,0.8);
}

.title{
  text-align:center;
  font-size:28px;
  letter-spacing:3px;
}

.name{
  text-align:center;
  font-size:34px;
  margin-top:10px;
  font-weight:bold;
}

.course,.meta{
  text-align:center;
  margin-top:10px;
}

/* ================= PROFESSIONAL SEAL ================= */
.seal{
  position:absolute;
  bottom:40px;
  right:40px;

  width:150px;
  height:150px;
  border-radius:50%;

  background:
    radial-gradient(circle at 30% 30%, #fff 0%, #f6e7c1 30%, #d4af37 70%, #8b6b1f 100%);

  border:6px double #b08d37;

  box-shadow:
    inset 0 0 15px rgba(0,0,0,0.25),
    0 10px 30px rgba(0,0,0,0.3);

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:11px;
  font-weight:bold;
  text-align:center;
  color:#3b2a00;

  transform:rotate(-8deg);
}

/* QR */
#qr{
  position:absolute;
  bottom:40px;
  left:40px;
}

/* BLOCKCHAIN */
.block{
  background:rgba(255,255,255,0.08);
  padding:10px;
  margin-top:8px;
  border-left:3px solid #f5d07a;
}

.ok{color:#00ff88;}
.bad{color:#ff4d4d;}

</style>
</head>

<body>

<div class="container">
<div class="panel">

<h1>🏛️ DRF CHAIN UNIVERSITY (Genuine Authority System)</h1>

<!-- VERIFY FIRST -->
<div>
<h3>🔐 Verification Portal</h3>
<input id="vid" placeholder="Enter Certificate ID">
<button onclick="verify()">Verify</button>
<p id="result"></p>
</div>

<!-- CERTIFICATE -->
<div class="diploma" id="diploma">

<div class="title">DRF CHAIN UNIVERSITY</div>

<div class="name" id="d_name"></div>
<div class="meta" id="d_id"></div>
<div class="course" id="d_course"></div>
<div class="meta" id="d_tier"></div>
<div class="meta" id="d_chain"></div>

<div class="seal">
DRF CHAIN<br>
OFFICIAL<br>
SEAL
</div>

<div id="qr"></div>

</div>

<!-- LEDGER -->
<h3>⛓️ Ledger</h3>
<div id="chain"></div>

</div>
</div>

<script>

/* ================= STORAGE ================= */
let chain = JSON.parse(localStorage.getItem("drf_final") || "[]");

/* ================= NORMALIZE (FIX ALL ISSUES) ================= */
function clean(b){
  return {
    id: b.id || "DRF-UNKNOWN",
    name: b.name || "Genuine DRF Chain User",
    gov: b.gov || "N/A",
    course: b.course || "Not Assigned",
    tier: b.tier || "Standard"
  };
}

/* ================= VERIFY ================= */
function verify(){

let b = chain.find(x => x.id === vid.value);

if(!b){
  result.innerHTML = "<span class='bad'>NOT FOUND</span>";
  diploma.style.display = "none";
  return;
}

b = clean(b);

/* SHOW SAME CERTIFICATE AFTER VERIFY */
diploma.style.display = "block";

d_name.innerHTML = b.name;
d_id.innerHTML = "ID: " + b.gov;
d_course.innerHTML = b.course;
d_tier.innerHTML = "🏆 " + b.tier;
d_chain.innerHTML = "⛓️ " + b.id;

/* QR */
qr.innerHTML = "";
new QRCode(document.getElementById("qr"),{
  text: location.href + "?id=" + b.id,
  width:110,
  height:110
});

result.innerHTML = "<span class='ok'>VERIFIED ✔</span>";
}

/* ================= RENDER ================= */
function render(){
let box=document.getElementById("chain");
box.innerHTML="";
chain.forEach(b=>{
b = clean(b);
box.innerHTML += `
<div class="block">
<b>${b.id}</b> | ${b.name} | ${b.course}
</div>`;
});
}

render();

</script>

</body>
</html>
