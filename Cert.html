<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRF Global University SaaS (Stable Edition)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
  margin:0;
  font-family: Georgia, serif;
  background: radial-gradient(circle at top,#0b0b0b,#000);
  color:white;
}

.container{
  display:flex;
  justify-content:center;
  padding:30px;
}

.panel{
  width:1100px;
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
  backdrop-filter: blur(25px);
}

/* inputs */
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  padding:12px 18px;
  background:linear-gradient(90deg,#b08d57,#f5d07a);
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* sections */
.section{
  margin-top:20px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.15);
}

/* diploma */
.diploma{
  display:none;
  margin-top:20px;
  padding:70px;
  background:white;
  color:#111;
  border:10px solid #b08d57;
  position:relative;
  box-shadow:0 50px 120px rgba(0,0,0,0.8);
}

.title{text-align:center;font-size:28px;letter-spacing:3px;}
.name{text-align:center;font-size:34px;margin-top:10px;font-weight:bold;}
.course{text-align:center;font-size:22px;margin-top:10px;}
.meta{text-align:center;margin-top:8px;}

/* seal */
.seal{
  position:absolute;
  bottom:30px;
  right:30px;
  width:140px;
  height:140px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:11px;
  font-weight:bold;
  color:white;

  background: linear-gradient(45deg,#00f2ff,#ff00ff,#00ff88,#ffd700);
  background-size:400% 400%;

  box-shadow:0 0 25px rgba(0,255,255,0.4);

  animation:holo 5s linear infinite, float 3s ease-in-out infinite;
}

@keyframes holo{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
  100%{transform:translateY(0);}
}

/* QR */
#qr{
  position:absolute;
  bottom:30px;
  left:30px;
}

/* blockchain */
.block{
  background:rgba(255,255,255,0.08);
  padding:10px;
  margin-top:8px;
  border-left:3px solid #f5d07a;
}

.ok{color:#00ff88;}
.bad{color:#ff4d4d;}

</style>
</head>

<body>

<div class="container">
<div class="panel">

<h1>🏛️ DRF GLOBAL UNIVERSITY SAAS (FIXED)</h1>

<!-- LOGIN -->
<div class="section">
<h3>🔐 Admin Login</h3>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Unlock Admin Panel</button>
</div>

<!-- ADMIN -->
<div class="section" id="adminPanel" style="display:none;">
<h3>👨‍💼 Mint Certificate</h3>

<input id="name" placeholder="Full Name">
<input id="gov" placeholder="ID Number">

<select id="course">
  <option>Diploma in Human Resources</option>
  <option>Diploma in Administrative Office</option>
  <option>Bachelor in Business Management</option>
  <option>Master in Information Systems</option>
</select>

<select id="tier">
  <option>Top Ten Tier</option>
  <option>Distinction</option>
  <option>Merit</option>
</select>

<button onclick="mint()">Mint Certificate</button>
</div>

<!-- VERIFY -->
<div class="section">
<h3>🔐 Verification Portal</h3>
<input id="vid" placeholder="Certificate ID">
<button onclick="verify()">Verify</button>
<p id="result"></p>
</div>

<!-- DIPLOMA -->
<div class="diploma" id="diploma">

<div class="title">DRF GLOBAL UNIVERSITY</div>

<div class="name" id="d_name"></div>
<div class="meta" id="d_id"></div>
<div class="course" id="d_course"></div>
<div class="meta" id="d_tier"></div>
<div class="meta" id="d_chain"></div>

<div class="seal">DRF<br>CHAIN<br>AUTH</div>
<div id="qr"></div>

</div>

<h3>⛓️ Ledger</h3>
<div id="chain"></div>

</div>
</div>

<script>

/* ================= SAFE STORAGE ================= */
let chain = JSON.parse(localStorage.getItem("drf_safe") || "[]");

/* ================= LOGIN ================= */
function login(){
  if(u.value==="Fayaz91000" && p.value==="91000"){
    adminPanel.style.display="block";
  } else {
    alert("Invalid login");
  }
}

/* ================= HASH ================= */
async function hash(data){
  const e=new TextEncoder().encode(data);
  const b=await crypto.subtle.digest("SHA-256",e);
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ================= FIX OLD DATA (ANTI UNDEFINED SYSTEM) ================= */
function normalize(b){
  return {
    id: b.id || "DRF-UNKNOWN",
    name: b.name || "Unknown User",
    gov: b.gov || "N/A",
    course: b.course || "Not Assigned",
    tier: b.tier || "Standard",
    prev: b.prev || "0",
    hash: b.hash || ""
  };
}

/* ================= MINT ================= */
async function mint(){

const id="DRF-"+Date.now();
const prev=chain.length?chain[chain.length-1].hash:"0";

const raw = {
  id,
  name:name.value,
  gov:gov.value,
  course:course.value,
  tier:tier.value,
  prev
};

const h=await hash(id+raw.name+raw.gov+raw.course+raw.tier+prev);

const block={...raw, hash:h};

chain.push(block);
localStorage.setItem("drf_safe",JSON.stringify(chain));

show(block);
render();
}

/* ================= SHOW DIPLOMA (NO UNDEFINED) ================= */
function show(b){

b = normalize(b);

diploma.style.display="block";

d_name.innerHTML = b.name;
d_id.innerHTML = "ID: " + b.gov;
d_course.innerHTML = b.course;
d_tier.innerHTML = "🏆 " + b.tier;
d_chain.innerHTML = "⛓️ " + b.id;

qr.innerHTML="";
new QRCode(document.getElementById("qr"),{
text:location.href+"?id="+b.id,
width:110,height:110
});
}

/* ================= VERIFY ================= */
function verify(){

let b=chain.find(x=>x.id===vid.value);

if(!b){
result.innerHTML="<span class='bad'>NOT FOUND</span>";
return;
}

b = normalize(b);

result.innerHTML="<span class='ok'>VERIFIED ✔</span> " + b.name;
}

/* ================= RENDER ================= */
function render(){
let box=document.getElementById("chain");
box.innerHTML="";
chain.forEach(b=>{
b = normalize(b);

box.innerHTML+=`
<div class="block">
<b>${b.id}</b> | ${b.name} | ${b.course}
</div>`;
});
}

render();

</script>

</body>
</html>
