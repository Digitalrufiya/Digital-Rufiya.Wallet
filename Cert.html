<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRF Chain Academic Authority System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family:"Georgia",serif;
  background:#0b0b0b;
  color:#fff;
}

.container{
  display:flex;
  justify-content:center;
  padding:30px;
}

.panel{
  width:1050px;
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:18px;
  backdrop-filter:blur(25px);
}

/* ================= INPUT ================= */
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}

button{
  padding:12px 18px;
  background:linear-gradient(90deg,#b08d57,#f5d07a);
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* ================= ADMIN PANEL ================= */
#adminPanel{
  display:none;
  padding:15px;
  border:1px solid rgba(255,255,255,0.2);
  margin-top:15px;
}

/* ================= VERIFICATION ================= */
.section{
  margin-top:25px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.15);
}

/* ================= DIPLOMA DESIGN ================= */
.diploma{
  display:none;
  margin-top:25px;
  padding:80px 70px;
  background:#fff;
  color:#111;
  position:relative;
  border:12px solid #b08d57;
  box-shadow:0 50px 120px rgba(0,0,0,0.8);
}

/* HEADER LINE */
.diploma:before{
  content:"";
  position:absolute;
  top:20px;
  left:20px;
  right:20px;
  height:2px;
  background:#b08d57;
  opacity:0.6;
}

/* FOOTER LINE */
.diploma:after{
  content:"";
  position:absolute;
  bottom:20px;
  left:20px;
  right:20px;
  height:2px;
  background:#b08d57;
  opacity:0.6;
}

/* TITLE */
.title{
  text-align:center;
  font-size:28px;
  letter-spacing:3px;
  margin-bottom:30px;
}

/* NAME */
.name{
  text-align:center;
  font-size:34px;
  font-weight:bold;
  margin:10px 0;
}

/* COURSE */
.course{
  text-align:center;
  font-size:22px;
  margin-top:10px;
}

/* DETAILS */
.details{
  text-align:center;
  margin-top:15px;
  font-size:16px;
}

/* SEAL (FIXED POSITION) */
.seal{
  position:absolute;
  bottom:35px;
  right:35px;
  width:120px;
  height:120px;
  border-radius:50%;
  border:6px double #b08d57;
  background:radial-gradient(circle,#fff,#f6e3b5);
  box-shadow:inset 0 0 15px rgba(0,0,0,0.2);
}

/* QR POSITION */
#qr{
  position:absolute;
  bottom:35px;
  left:35px;
}

/* BLOCKCHAIN */
.block{
  background:rgba(255,255,255,0.08);
  padding:10px;
  margin-top:8px;
  border-left:3px solid #f5d07a;
}

.ok{color:#00ff88;font-weight:bold;}
.bad{color:#ff4d4d;font-weight:bold;}

</style>
</head>

<body>

<div class="container">
<div class="panel">

<h1>🏛️ DRF Chain Academic Authority System</h1>

<!-- ================= ADMIN LOGIN ================= -->
<div class="section">
<h3>🔐 Admin Login</h3>
<input id="u" placeholder="Admin Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Unlock Admin Panel</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<h3>👨‍💼 Issue Diploma Certificate</h3>

<input id="name" placeholder="Full Name">
<input id="gov" placeholder="ID Number (A0193839)">

<select id="course">
  <option>Diploma in Human Resources</option>
  <option>Diploma in Administrative Office</option>
  <option>Bachelor in Business Management</option>
  <option>Master in Information Systems</option>
</select>

<select id="tier">
  <option>Top Ten Tier</option>
  <option>Distinction</option>
  <option>Merit</option>
</select>

<button onclick="mint()">Mint Certificate</button>
</div>

<!-- VERIFY -->
<div class="section">
<h3>🔐 Verification Portal</h3>
<input id="vid" placeholder="Certificate ID">
<button onclick="verify()">Verify</button>
<p id="result"></p>
</div>

<!-- DIPLOMA -->
<div class="diploma" id="diploma">

<div class="title">DRF CHAIN UNIVERSITY</div>

<div class="name" id="d_name"></div>
<div class="details" id="d_id"></div>
<div class="course" id="d_course"></div>
<div class="details" id="d_tier"></div>
<div class="details" id="d_chain"></div>

<div class="seal"></div>
<div id="qr"></div>

</div>

<!-- BLOCKCHAIN -->
<h3>⛓️ Ledger</h3>
<div id="chain"></div>

</div>
</div>

<script>

let chain = JSON.parse(localStorage.getItem("drf_uni") || "[]");

/* ================= LOGIN ================= */
function login(){
  if(u.value==="Fayaz91000" && p.value==="91000"){
    adminPanel.style.display="block";
  } else {
    alert("Invalid login");
  }
}

/* ================= HASH ================= */
async function hash(data){
  const e=new TextEncoder().encode(data);
  const b=await crypto.subtle.digest("SHA-256",e);
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ================= MINT ================= */
async function mint(){

const id="DRF-"+Date.now();
const prev=chain.length?chain[chain.length-1].hash:"0";

const data=id+name.value+gov.value+course.value+tier.value+prev;
const h=await hash(data);

const block={id,name:name.value,gov:gov.value,course:course.value,tier:tier.value,prev,hash:h};

chain.push(block);
localStorage.setItem("drf_uni",JSON.stringify(chain));

render();
showDiploma(block);
}

/* ================= DIPLOMA ================= */
function showDiploma(b){

diploma.style.display="block";

d_name.innerHTML=b.name;
d_id.innerHTML="ID: "+b.gov;
d_course.innerHTML=b.course;
d_tier.innerHTML="🏆 "+b.tier;
d_chain.innerHTML="⛓️ "+b.id;

qr.innerHTML="";
new QRCode(document.getElementById("qr"),{
text:location.href+"?id="+b.id,
width:110,height:110
});
}

/* ================= VERIFY ================= */
function verify(){

let b=chain.find(x=>x.id===vid.value);

if(!b){
result.innerHTML="<span class='bad'>NOT FOUND</span>";
return;
}

result.innerHTML="<span class='ok'>VERIFIED ✔</span> "+b.name;
}

/* ================= RENDER ================= */
function render(){
let box=document.getElementById("chain");
box.innerHTML="";
chain.forEach(b=>{
box.innerHTML+=`
<div class="block">
<b>${b.id}</b> | ${b.name} | ${b.course}
</div>`;
});
}

render();

</script>

</body>
</html>
