<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRF Global University SaaS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

/* ================= GLOBAL UI ================= */
body{
  margin:0;
  font-family: Georgia, serif;
  background: radial-gradient(circle at top,#0b0b0b,#000);
  color:white;
}

.container{
  display:flex;
  justify-content:center;
  padding:30px;
}

.panel{
  width:1100px;
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
  backdrop-filter: blur(25px);
}

/* INPUTS */
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:12px 18px;
  background:linear-gradient(90deg,#b08d57,#f5d07a);
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* ================= SECTIONS ================= */
.section{
  margin-top:25px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.15);
}

/* ================= ADMIN ================= */
#adminPanel{
  display:none;
}

/* ================= DIPLOMA ================= */
.diploma{
  display:none;
  margin-top:25px;
  padding:70px;
  background:#fff;
  color:#111;
  position:relative;
  border:10px solid #b08d57;
  box-shadow:0 50px 120px rgba(0,0,0,0.8);
}

/* HEADER/FOOTER */
.diploma:before,
.diploma:after{
  content:"";
  position:absolute;
  left:20px;
  right:20px;
  height:2px;
  background:#b08d57;
}

.diploma:before{top:20px;}
.diploma:after{bottom:20px;}

/* TEXT */
.title{text-align:center;font-size:28px;letter-spacing:3px;}
.name{text-align:center;font-size:34px;margin-top:15px;font-weight:bold;}
.course{text-align:center;font-size:22px;margin-top:10px;}
.meta{text-align:center;margin-top:10px;}

/* ================= HOLOGRAPHIC SEAL ================= */
.seal{
  position:absolute;
  bottom:35px;
  right:35px;
  width:140px;
  height:140px;
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;

  font-size:11px;
  font-weight:bold;
  color:white;

  background: linear-gradient(45deg,#00f2ff,#ff00ff,#00ff88,#ffd700);
  background-size:400% 400%;

  border:2px solid rgba(255,255,255,0.4);

  box-shadow:0 0 25px rgba(0,255,255,0.4);

  animation: holo 5s linear infinite, float 3s ease-in-out infinite;
}

/* animation */
@keyframes holo{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
  100%{transform:translateY(0);}
}

/* QR */
#qr{
  position:absolute;
  bottom:35px;
  left:35px;
}

/* BLOCKCHAIN */
.block{
  background:rgba(255,255,255,0.08);
  padding:10px;
  margin-top:8px;
  border-left:3px solid #f5d07a;
}

.ok{color:#00ff88;}
.bad{color:#ff4d4d;}

</style>
</head>

<body>

<div class="container">
<div class="panel">

<h1>🏛️ DRF GLOBAL UNIVERSITY SAAS</h1>

<!-- ================= LOGIN ================= -->
<div class="section">
<h3>🔐 Admin Login</h3>
<input id="u" placeholder="Admin Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Unlock Admin Panel</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="section">
<h3>👨‍💼 Mint Global Certificate</h3>

<input id="name" placeholder="Full Name">
<input id="gov" placeholder="ID Number">

<select id="course">
  <option>Diploma in Human Resources</option>
  <option>Diploma in Administrative Office</option>
  <option>Bachelor in Business Management</option>
  <option>Master in Information Systems</option>
</select>

<select id="tier">
  <option>Top Ten Tier</option>
  <option>Distinction</option>
  <option>Merit</option>
</select>

<button onclick="mint()">Mint Certificate</button>
</div>

<!-- VERIFY -->
<div class="section">
<h3>🔐 Public Verification Portal</h3>
<input id="vid" placeholder="Enter Certificate ID">
<button onclick="verify()">Verify</button>
<p id="result"></p>
</div>

<!-- DIPLOMA -->
<div class="diploma" id="diploma">

<div class="title">DRF GLOBAL UNIVERSITY</div>
<div class="name" id="d_name"></div>
<div class="meta" id="d_id"></div>
<div class="course" id="d_course"></div>
<div class="meta" id="d_tier"></div>
<div class="meta" id="d_chain"></div>

<div class="seal">DRF<br>CHAIN<br>GLOBAL</div>
<div id="qr"></div>

</div>

<!-- LEDGER -->
<h3>⛓️ Global Blockchain Ledger</h3>
<div id="chain"></div>

</div>
</div>

<script>

let chain = JSON.parse(localStorage.getItem("drf_global") || "[]");

/* ================= LOGIN ================= */
function login(){
  if(u.value==="Fayaz91000" && p.value==="91000"){
    adminPanel.style.display="block";
  } else {
    alert("Invalid login");
  }
}

/* ================= HASH ================= */
async function hash(data){
  const e=new TextEncoder().encode(data);
  const b=await crypto.subtle.digest("SHA-256",e);
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}

/* ================= MINT ================= */
async function mint(){

const id="DRF-"+Date.now();
const prev=chain.length?chain[chain.length-1].hash:"0";

const data=id+name.value+gov.value+course.value+tier.value+prev;
const h=await hash(data);

const block={id,name:name.value,gov:gov.value,course:course.value,tier:tier.value,prev,hash:h};

chain.push(block);
localStorage.setItem("drf_global",JSON.stringify(chain));

showDiploma(block);
render();
}

/* ================= DIPLOMA ================= */
function showDiploma(b){

diploma.style.display="block";

d_name.innerHTML=b.name;
d_id.innerHTML="ID: "+b.gov;
d_course.innerHTML=b.course;
d_tier.innerHTML="🏆 "+b.tier;
d_chain.innerHTML="⛓️ "+b.id;

qr.innerHTML="";
new QRCode(document.getElementById("qr"),{
text:location.href+"?id="+b.id,
width:110,height:110
});
}

/* ================= VERIFY ================= */
function verify(){

let b=chain.find(x=>x.id===vid.value);

if(!b){
result.innerHTML="<span class='bad'>NOT FOUND</span>";
return;
}

result.innerHTML="<span class='ok'>VERIFIED ✔</span> "+b.name;
}

/* ================= RENDER ================= */
function render(){
let box=document.getElementById("chain");
box.innerHTML="";
chain.forEach(b=>{
box.innerHTML+=`
<div class="block">
<b>${b.id}</b> | ${b.name} | ${b.course}
</div>`;
});
}

render();

</script>

</body>
</html>
