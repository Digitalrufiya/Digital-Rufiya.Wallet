<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRF Certificate Verification Portal</title>

<style>
body {
  font-family: "Georgia", serif;
  background: #f4f1ea;
  margin: 0;
  padding: 0;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  width: 800px;
  background: white;
  padding: 50px;
  border: 3px solid #b08d57;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  text-align: center;
}

h1 {
  letter-spacing: 2px;
  margin-bottom: 30px;
}

input {
  width: 300px;
  padding: 12px;
  border: 1px solid #ccc;
  margin-top: 10px;
}

button {
  padding: 12px 18px;
  background: #b08d57;
  color: white;
  border: none;
  cursor: pointer;
  margin-left: 10px;
}

button:hover {
  background: #8c6d3d;
}

/* RESULT BOX */
.result {
  margin-top: 30px;
  padding: 20px;
  border: 1px solid #d6c6a5;
  background: #faf8f3;
  text-align: left;
  display: none;
}

.status {
  font-weight: bold;
  margin-bottom: 10px;
}

.verified {
  color: green;
}

.invalid {
  color: red;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>Certificate Verification Portal</h1>

    <p>Enter Certificate ID to verify authenticity</p>

    <input type="text" id="certId" placeholder="e.g. DRF-2026-0001">
    <button onclick="verify()">Verify</button>

    <div id="result" class="result"></div>

  </div>
</div>

<script>
/* =========================
   DATABASE (BLOCKCHAIN STYLE)
========================= */

const certificates = {
  "DRF-2026-0001": {
    name: "Hassan Fayaz",
    id: "A-303**8",
    course: "Master Level Certification in Web3 Blockchain Engineering",
    status: "Verified"
  },

  "DRF-2026-0002": {
    name: "Ali Ahmed",
    id: "A-889**2",
    course: "Master Level Certification in Smart Contract Development",
    status: "Verified"
  },

  "DRF-2026-0003": {
    name: "Sara Mohamed",
    id: "A-112**7",
    course: "Master Level Certification in AI Blockchain Systems",
    status: "Verified"
  }
};

/* =========================
   VERIFY FUNCTION
========================= */

function verify() {
  const input = document.getElementById("certId").value;
  const resultBox = document.getElementById("result");

  const cert = certificates[input];

  resultBox.style.display = "block";

  if (cert) {
    resultBox.innerHTML = `
      <div class="status verified">✔ CERTIFICATE VERIFIED</div>
      <p><b>Name:</b> ${cert.name}</p>
      <p><b>Government ID:</b> ${cert.id}</p>
      <p><b>Course:</b> ${cert.course}</p>
      <p><b>Certificate ID:</b> ${input}</p>
    `;
  } else {
    resultBox.innerHTML = `
      <div class="status invalid">❌ CERTIFICATE NOT FOUND</div>
      <p>This certificate is not registered in DRF Chain system.</p>
    `;
  }
}
</script>

</body>
</html>
