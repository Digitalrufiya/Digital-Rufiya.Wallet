<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRF Ultra Donation</title>

<style>
body {
  font-family: Arial;
  background:#0d1117;
  color:white;
  text-align:center;
  padding:20px;
}

.card {
  background:#161b22;
  padding:20px;
  border-radius:15px;
  max-width:400px;
  margin:auto;
  box-shadow:0 5px 25px rgba(0,0,0,0.6);
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin:10px 0;
  background:#21262d;
  color:white;
  font-size:16px;
}

.quick {
  display:flex;
  gap:10px;
}

.quick button {
  flex:1;
  background:#30363d;
}

button {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

.trust { background:#3375bb; color:white; }
.meta { background:#f6851b; color:white; }
.copy { background:#1f6feb; color:white; }

img {
  width:180px;
  margin:15px 0;
}

.address {
  background:#21262d;
  padding:10px;
  border-radius:10px;
  font-size:13px;
  word-break:break-all;
}

.warning {
  margin-top:15px;
  font-size:12px;
  color:#ffcc00;
}
</style>

</head>

<body>

<h2>💖 Support DRF Project</h2>
<p>USDC (BNB Smart Chain - BEP20)</p>

<div class="card">

  <!-- AMOUNT -->

  <input type="number" id="amount" placeholder="Enter amount (USDC)">

  <!-- QUICK -->

  <div class="quick">
    <button onclick="setAmount(5)">5</button>
    <button onclick="setAmount(10)">10</button>
    <button onclick="setAmount(25)">25</button>
  </div>

  <!-- WALLET BUTTONS -->

<button class="trust" onclick="openTrust()">🚀 Open Trust Wallet</button> <button class="meta" onclick="openMetaMask()">🦊 Open MetaMask</button>

  <!-- QR -->

  <img id="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0x88253D87990EdD1E647c3B6eD21F57fb061a3040">

  <!-- ADDRESS -->

  <div class="address" id="wallet">
    0x88253D87990EdD1E647c3B6eD21F57fb061a3040
  </div>

<button class="copy" onclick="copyAddress()">📋 Copy Address</button>

  <div class="warning">
    ⚠️ Send only USDC via BNB Smart Chain (BEP20)
  </div>

</div>

<script>

const address = "0x88253D87990EdD1E647c3B6eD21F57fb061a3040";

// QUICK AMOUNT
function setAmount(val){
  document.getElementById("amount").value = val;
}

// COPY
function copyAddress(){
  navigator.clipboard.writeText(address);
  alert("✅ Address copied!");
}

// TRUST WALLET
function openTrust(){
  let amount = document.getElementById("amount").value;
  let url = `https://link.trustwallet.com/send?address=${address}`;
  if(amount) url += `&amount=${amount}`;
  window.location.href = url;

  fallback();
}

// METAMASK (basic send)
function openMetaMask(){
  let amount = document.getElementById("amount").value;
  let url = `https://metamask.app.link/send/${address}`;
  if(amount) url += `?value=${amount}`;
  window.location.href = url;

  fallback();
}

// FALLBACK
function fallback(){
  setTimeout(()=>{
    alert("If wallet didn't open, use QR or copy address.");
  },2000);
}

</script>

</body>
</html>
