<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRF Donation</title>

<style>
body {
  font-family: Arial;
  background:#0d1117;
  color:white;
  text-align:center;
  padding:20px;
}

h2 {
  margin-bottom:10px;
}

.card {
  background:#161b22;
  padding:20px;
  border-radius:15px;
  max-width:400px;
  margin:auto;
  box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.network {
  color:#58a6ff;
  font-weight:bold;
  margin-bottom:10px;
}

img {
  width:200px;
  margin:15px 0;
  border-radius:10px;
}

.address {
  background:#21262d;
  padding:12px;
  border-radius:10px;
  word-break:break-all;
  font-size:14px;
  margin-top:10px;
}

button {
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#238636;
  color:white;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

button:hover {
  background:#2ea043;
}

.warning {
  margin-top:15px;
  font-size:13px;
  color:#ffcc00;
}
</style>

</head>

<body>

<h2>💖 Support DRF Project</h2>

<div class="card">

  <div class="network">Send USDC (BEP20 - BNB Chain)</div>

  <!-- QR CODE -->

  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=0x88253D87990EdD1E647c3B6eD21F57fb061a3040">

  <!-- WALLET ADDRESS -->

  <div class="address" id="wallet">
    0x88253D87990EdD1E647c3B6eD21F57fb061a3040
  </div>

<button onclick="copyAddress()">📋 Copy Address</button>

  <div class="warning">
    ⚠️ Only send USDC via BNB Smart Chain (BEP20). Sending via wrong network may result in loss of funds.
  </div>

</div>

<script>
function copyAddress(){
  let text = document.getElementById("wallet").innerText;
  navigator.clipboard.writeText(text);
  alert("✅ Address copied!");
}
</script>

</body>
</html>
